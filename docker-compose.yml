version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=mock
      # Add your API keys here or in a .env file
      # - NVIDIA_API_KEY=your_key_here
    volumes:
      - ./backend/cardekho_ai.db:/app/cardekho_ai.db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
